name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Install Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Build project
        env:
          VITE_APP_BASE_URL: "/${{ github.repository_name }}/"
        run: npm run build

      - name: Upload Build Artifact
        uses: actions/upload-pages-artifact@v5.0.0
        with:
          path: dist/

      - name: Deploy GitHub Pages site
        uses: actions/deploy-pages@v3.0.2-node.24
